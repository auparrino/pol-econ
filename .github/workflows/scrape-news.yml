name: Scrape Provincial News

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC = 5am ART daily
  workflow_dispatch:       # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run news scraper
        run: node scripts/scrape-news.mjs

      - name: Commit updated news data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news/
          if git diff --staged --quiet; then
            echo "No news changes to commit"
          else
            git commit -m "chore: update provincial news data [skip ci]"
            git push
          fi
